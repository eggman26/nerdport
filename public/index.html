<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>NerdPort</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05abab;
    color:white;
    font-family:Arial,sans-serif;
    height:100vh;
    overflow:hidden;
}

/* LOGIN */

#login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#05abab;
}

.login-box{
    width:400px;
    background:#05dfdf;
    padding:35px;
    border-radius:24px;
}

.login-box h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:14px;
    background:#334155;
    color:white;
    outline:none;
}

button{
    padding:14px 18px;
    border:none;
    border-radius:14px;
    background:#05dfdf;
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#1d4ed8;
}

/* APP */

#app{
    display:none;
    height:100vh;
}

.layout{
    display:grid;
    grid-template-columns:260px 1fr;
    height:100%;
}

/* SIDEBAR */

.sidebar{
    background:#111827;
    padding:20px;
    overflow-y:auto;
    border-right:
    1px solid rgba(255,255,255,.08);
}

.logo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:25px;
}

.user{
    background:#1e293b;
    padding:14px;
    border-radius:14px;
    margin-bottom:12px;
}

/* MAIN */

.main{
    display:flex;
    flex-direction:column;
    padding:20px;
    gap:15px;
    overflow:hidden;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111827;
    padding:15px 20px;
    border-radius:18px;
}

.controls{
    display:flex;
    gap:10px;
}

#videos{
    flex:1;
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));
    gap:18px;
    overflow:auto;
}

.video-card{
    background:#1e293b;
    border-radius:22px;
    overflow:hidden;
    position:relative;
    min-height:240px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

.video-label{
    position:absolute;
    left:12px;
    bottom:12px;
    background:rgba(0,0,0,.6);
    padding:8px 12px;
    border-radius:10px;
    font-size:14px;
}

/* CHAT */

.chat{
    height:220px;
    background:#111827;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.messages{
    flex:1;
    overflow:auto;
    padding:15px;
}

.message{
    background:#2563eb;
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
    width:fit-content;
    max-width:80%;
}

.chat-bottom{
    display:flex;
    gap:10px;
    padding:15px;
}

.chat-bottom input{
    margin:0;
}

@media(max-width:900px){

    .layout{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

}

</style>

</head>
<body>

<div id="login">

    <div class="login-box">

        <h1>NerdPort</h1>

        <input
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button onclick="join()">
            Join
        </button>

    </div>

</div>

<div id="app">

    <div class="layout">

        <div class="sidebar">

            <div class="logo">
                NerdPort
            </div>

            <div id="users"></div>

        </div>

        <div class="main">

            <div class="topbar">

                <h2>Live Chat</h2>

                <div class="controls">

                    <button
                    class="mic-btn"
                    onclick="toggleMic()">
                        Mic On
                    </button>

                    <button
                    onclick="toggleCamera()">
                        Camera
                    </button>

                </div>

            </div>

            <div id="videos"></div>

            <div class="chat">

                <div
                class="messages"
                id="messages"></div>

                <div class="chat-bottom">

                    <input
                    id="messageInput"
                    placeholder="Message">

                    <button
                    onclick="sendMessage()">
                        Send
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const PASSWORD_CODE =
"5-7-7-13-1-14";

const socket = io();

let localStream;

let username;

/* JOIN */

async function join(){

    username =
        document
        .getElementById(
            "username"
        ).value.trim();

    const password =
        document
        .getElementById(
            "password"
        ).value
        .toLowerCase();

    const encoded =
        password
        .split("")
        .map(letter => {

            return (
                letter.charCodeAt(0) - 96
            );

        })
        .join("-");

    if(encoded !== PASSWORD_CODE){

        alert("Wrong password");

        return;

    }

    try{

        localStream =
            await navigator
            .mediaDevices
            .getUserMedia({
                video:true,
                audio:true
            });

    }catch(err){

        alert(
            "Camera/Microphone blocked"
        );

        return;

    }

    document
    .getElementById(
        "login"
    ).style.display = "none";

    document
    .getElementById(
        "app"
    ).style.display = "block";

    addVideo(
        localStream,
        username + " (You)",
        true
    );

    updateMicButtons();

}

/* VIDEO */

function addVideo(
    stream,
    name,
    muted
){

    const card =
        document.createElement(
            "div"
        );

    card.className =
        "video-card";

    const video =
        document.createElement(
            "video"
        );

    video.srcObject =
        stream;

    video.autoplay = true;

    video.playsInline = true;

    video.muted = muted;

    video.onloadedmetadata =
        () => {

        video.play();

    };

    const label =
        document.createElement(
            "div"
        );

    label.className =
        "video-label";

    label.innerText =
        name;

    card.appendChild(video);

    card.appendChild(label);

    document
    .getElementById(
        "videos"
    )
    .appendChild(card);

}

/* CHAT */

function sendMessage(){

    const input =
        document
        .getElementById(
            "messageInput"
        );

    if(input.value.trim()==="")
        return;

    const div =
        document
        .createElement(
            "div"
        );

    div.className =
        "message";

    div.innerText =
        username +
        ": " +
        input.value;

    document
    .getElementById(
        "messages"
    )
    .appendChild(div);

    input.value = "";

}

/* MIC */

function updateMicButtons(){

    const enabled =
        localStream
        .getAudioTracks()[0]
        .enabled;

    document
    .querySelectorAll(
        ".mic-btn"
    )
    .forEach(btn => {

        btn.innerText =
            enabled
            ? "Mic On"
            : "Mic Off";

        btn.style.background =
            enabled
            ? "#2563eb"
            : "#dc2626";

    });

}

function toggleMic(){

    const track =
        localStream
        .getAudioTracks()[0];

    track.enabled =
        !track.enabled;

    updateMicButtons();

}

/* CAMERA */

function toggleCamera(){

    const track =
        localStream
        .getVideoTracks()[0];

    track.enabled =
        !track.enabled;

}

</script>

</body>
</html>
