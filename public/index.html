<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>NerdPort</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    height:100vh;
    overflow:hidden;
}

#login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
}

.login-box{
    width:400px;
    background:#1e293b;
    padding:35px;
    border-radius:24px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:14px;
    background:#334155;
    color:white;
}

button{
    padding:14px 18px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

#app{
    display:none;
    height:100vh;
}

.layout{
    display:grid;
    grid-template-columns:280px 1fr;
    height:100%;
}

.sidebar{
    background:#111827;
    padding:20px;
}

.main{
    display:flex;
    flex-direction:column;
    padding:20px;
    gap:15px;
}

#videos{
    flex:1;
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(300px,1fr));
    gap:15px;
    overflow:auto;
}

.video-card{
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    height:240px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

.video-label{
    position:absolute;
    bottom:10px;
    left:10px;
    background:rgba(0,0,0,.6);
    padding:8px 12px;
    border-radius:10px;
}

.chat{
    height:220px;
    background:#111827;
    border-radius:20px;
    display:flex;
    flex-direction:column;
}

.messages{
    flex:1;
    overflow:auto;
    padding:15px;
}

.message{
    background:#2563eb;
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
}

.chat-bottom{
    display:flex;
    gap:10px;
    padding:15px;
}

.chat-bottom input{
    margin:0;
}

</style>

</head>
<body>

<div id="login">

    <div class="login-box">

        <h1>NerdPort</h1>

        <input
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button onclick="join()">
            Join
        </button>

    </div>

</div>

<div id="app">

    <div class="layout">

        <div class="sidebar">

            <h2>Users</h2>

            <div id="users"></div>

        </div>

        <div class="main">

            <div id="videos"></div>

            <div class="chat">

                <div
                class="messages"
                id="messages"></div>

                <div class="chat-bottom">

                    <input
                    id="messageInput"
                    placeholder="Message">

                    <button
                    onclick="sendMessage()">
                        Send
                    </button>

                    <button
                    onclick="toggleMic()">
                        Mic
                    </button>

                    <button
                    onclick="toggleCamera()">
                        Camera
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const PASSWORD = "6741";

const socket = io();

let localStream;

let username;

const peers = {};

/* JOIN */

async function join(){

    username =
        document
        .getElementById(
            "username"
        ).value.trim();

    const password =
        document
        .getElementById(
            "password"
        ).value;

    if(password !== PASSWORD){

        alert("Wrong password");

        return;

    }

    document
    .getElementById(
        "login"
    ).style.display = "none";

    document
    .getElementById(
        "app"
    ).style.display = "block";

    localStream =
        await navigator
        .mediaDevices
        .getUserMedia({
            video:true,
            audio:true
        });

    addVideo(
        localStream,
        username + " (You)",
        true
    );

    socket.emit(
        "join",
        username
    );

}

/* VIDEO */

function addVideo(
    stream,
    name,
    muted
){

    const card =
        document.createElement("div");

    card.className =
        "video-card";

    const video =
        document.createElement("video");

    video.srcObject =
        stream;

    video.autoplay = true;

    video.playsInline = true;

    video.muted = muted;

    const label =
        document.createElement("div");

    label.className =
        "video-label";

    label.innerText =
        name;

    card.appendChild(video);

    card.appendChild(label);

    document
    .getElementById(
        "videos"
    )
    .appendChild(card);

}

/* USERS */

socket.on("users", users => {

    const usersDiv =
        document
        .getElementById(
            "users"
        );

    usersDiv.innerHTML = "";

    Object.values(users)
    .forEach(name => {

        const div =
            document.createElement(
                "div"
            );

        div.innerText = name;

        usersDiv.appendChild(div);

    });

});

/* CHAT */

function sendMessage(){

    const input =
        document
        .getElementById(
            "messageInput"
        );

    if(input.value.trim()==="")
        return;

    socket.emit(
        "message",
        {
            user:username,
            text:input.value
        }
    );

    input.value = "";

}

socket.on("message", data => {

    const div =
        document.createElement(
            "div"
        );

    div.className =
        "message";

    div.innerText =
        data.user +
        ": " +
        data.text;

    document
    .getElementById(
        "messages"
    )
    .appendChild(div);

});

/* TOGGLES */

function toggleMic(){

    const track =
        localStream
        .getAudioTracks()[0];

    track.enabled =
        !track.enabled;

}

function toggleCamera(){

    const track =
        localStream
        .getVideoTracks()[0];

    track.enabled =
        !track.enabled;

}

</script>

</body>
</html>
