<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>NerdPort</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    height:100vh;
    overflow:hidden;
}

/* LOGIN */

#login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
    );
}

.login-box{
    width:400px;
    background:#1e293b;
    padding:35px;
    border-radius:24px;
    box-shadow:
    0 0 40px rgba(0,0,0,.4);
}

.login-box h1{
    text-align:center;
    margin-bottom:25px;
    font-size:38px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:14px;
    background:#334155;
    color:white;
    font-size:15px;
    outline:none;
}

input::placeholder{
    color:#cbd5e1;
}

button{
    padding:14px 18px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:.2s;
    font-size:15px;
}

button:hover{
    transform:scale(1.03);
    background:#1d4ed8;
}

.join-btn{
    width:100%;
}

/* APP */

#app{
    display:none;
    height:100vh;
}

.layout{
    display:grid;
    grid-template-columns:280px 1fr;
    height:100%;
}

/* SIDEBAR */

.sidebar{
    background:#111827;
    padding:20px;
    border-right:
    1px solid rgba(255,255,255,.08);
    overflow-y:auto;
}

.logo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:25px;
}

.sidebar-title{
    margin-bottom:15px;
    color:#94a3b8;
    font-size:14px;
    text-transform:uppercase;
}

.user{
    background:#1e293b;
    padding:14px;
    border-radius:14px;
    margin-bottom:12px;
}

/* MAIN */

.main{
    display:flex;
    flex-direction:column;
    padding:20px;
    gap:15px;
    overflow:hidden;
}

.topbar{
    background:#111827;
    border-radius:18px;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.controls{
    display:flex;
    gap:10px;
}

#videos{
    flex:1;
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));
    gap:18px;
    overflow-y:auto;
}

.video-card{
    background:#1e293b;
    border-radius:22px;
    overflow:hidden;
    position:relative;
    min-height:240px;
    box-shadow:
    0 0 25px rgba(0,0,0,.25);
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

.video-label{
    position:absolute;
    bottom:12px;
    left:12px;
    background:rgba(0,0,0,.6);
    padding:8px 12px;
    border-radius:12px;
    font-size:14px;
}

/* CHAT */

.chat{
    height:220px;
    background:#111827;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.message{
    background:#2563eb;
    padding:12px;
    border-radius:14px;
    margin-bottom:12px;
    width:fit-content;
    max-width:80%;
}

.chat-bottom{
    display:flex;
    gap:10px;
    padding:15px;
    border-top:
    1px solid rgba(255,255,255,.08);
}

.chat-bottom input{
    margin:0;
}

@media(max-width:900px){

    .layout{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="login">

    <div class="login-box">

        <h1>NerdPort</h1>

        <input
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button
        class="join-btn"
        onclick="join()">
            Join
        </button>

    </div>

</div>

<!-- APP -->

<div id="app">

    <div class="layout">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <div class="logo">
                NerdPort
            </div>

            <div class="sidebar-title">
                Online Users
            </div>

            <div id="users"></div>

        </div>

        <!-- MAIN -->

        <div class="main">

            <div class="topbar">

                <h2>
                    Live Video Chat
                </h2>

                <div class="controls">

                    <button
                    onclick="toggleMic()">
                        Mic
                    </button>

                    <button
                    onclick="toggleCamera()">
                        Camera
                    </button>

                </div>

            </div>

            <!-- VIDEOS -->

            <div id="videos"></div>

            <!-- CHAT -->

            <div class="chat">

                <div
                class="messages"
                id="messages"></div>

                <div class="chat-bottom">

                    <input
                    id="messageInput"
                    placeholder="Send message">

                    <button
                    onclick="sendMessage()">
                        Send
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const PASSWORD = "6741";

const socket = io();

let localStream;

let username;

/* JOIN */

async function join(){

    username =
        document
        .getElementById(
            "username"
        ).value.trim();

    const password =
        document
        .getElementById(
            "password"
        ).value;

    if(password !== PASSWORD){

        alert(
            "Wrong password"
        );

        return;

    }

    document
    .getElementById(
        "login"
    ).style.display = "none";

    document
    .getElementById(
        "app"
    ).style.display = "block";

    localStream =
        await navigator
        .mediaDevices
        .getUserMedia({
            video:true,
            audio:true
        });

    addVideo(
        localStream,
        username + " (You)",
        true
    );

    addUser(username);

    socket.emit(
        "join-room",
        username
    );

}

/* VIDEO */

function addVideo(
    stream,
    name,
    muted
){

    const card =
        document.createElement(
            "div"
        );

    card.className =
        "video-card";

    const video =
        document.createElement(
            "video"
        );

    video.srcObject =
        stream;

    video.autoplay = true;

    video.playsInline = true;

    video.muted = muted;

    const label =
        document.createElement(
            "div"
        );

    label.className =
        "video-label";

    label.innerText =
        name;

    card.appendChild(video);

    card.appendChild(label);

    document
    .getElementById(
        "videos"
    )
    .appendChild(card);

}

/* USERS */

function addUser(name){

    const div =
        document.createElement(
            "div"
        );

    div.className = "user";

    div.innerText = name;

    document
    .getElementById(
        "users"
    )
    .appendChild(div);

}

/* CHAT */

function sendMessage(){

    const input =
        document
        .getElementById(
            "messageInput"
        );

    if(input.value.trim()==="")
        return;

    socket.emit(
        "message",
        {
            user:username,
            text:input.value
        }
    );

    input.value = "";

}

socket.on(
    "message",
    data => {

        addMessage(
            data.user +
            ": " +
            data.text
        );

    }
);

function addMessage(text){

    const div =
        document.createElement(
            "div"
        );

    div.className =
        "message";

    div.innerText =
        text;

    document
    .getElementById(
        "messages"
    )
    .appendChild(div);

}

/* MIC */

function toggleMic(){

    const track =
        localStream
        .getAudioTracks()[0];

    track.enabled =
        !track.enabled;

}

/* CAMERA */

function toggleCamera(){

    const track =
        localStream
        .getVideoTracks()[0];

    track.enabled =
        !track.enabled;

}

</script>

</body>
</html>
