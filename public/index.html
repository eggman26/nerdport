<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>NerdPort</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    height:100vh;
    overflow:hidden;
}

/* LOGIN */

#login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
    );
}

.login-box{
    width:400px;
    background:#1e293b;
    padding:35px;
    border-radius:24px;
}

.login-box h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:14px;
    background:#334155;
    color:white;
    outline:none;
}

button{
    padding:14px 18px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* APP */

#app{
    display:none;
    height:100vh;
}

.layout{
    display:grid;
    grid-template-columns:260px 1fr;
    height:100%;
}

/* SIDEBAR */

.sidebar{
    background:#111827;
    padding:20px;
    overflow-y:auto;
    border-right:
    1px solid rgba(255,255,255,.08);
}

.logo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:25px;
}

.user{
    background:#1e293b;
    padding:14px;
    border-radius:14px;
    margin-bottom:12px;
}

/* MAIN */

.main{
    display:flex;
    flex-direction:column;
    padding:20px;
    gap:15px;
    overflow:hidden;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111827;
    padding:15px 20px;
    border-radius:18px;
}

.controls{
    display:flex;
    gap:10px;
}

#videos{
    flex:1;
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));
    gap:18px;
    overflow:auto;
}

.video-card{
    background:#1e293b;
    border-radius:22px;
    overflow:hidden;
    position:relative;
    min-height:240px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

.video-label{
    position:absolute;
    left:12px;
    bottom:12px;
    background:rgba(0,0,0,.6);
    padding:8px 12px;
    border-radius:10px;
    font-size:14px;
}

/* CHAT */

.chat{
    height:220px;
    background:#111827;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.messages{
    flex:1;
    overflow:auto;
    padding:15px;
}

.message{
    background:#2563eb;
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
    width:fit-content;
    max-width:80%;
}

.chat-bottom{
    display:flex;
    gap:10px;
    padding:15px;
}

.chat-bottom input{
    margin:0;
}

@media(max-width:900px){

    .layout{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

}

</style>

</head>
<body>

<div id="login">

    <div class="login-box">

        <h1>NerdPort</h1>

        <input
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button onclick="join()">
            Join
        </button>

    </div>

</div>

<div id="app">

    <div class="layout">

        <div class="sidebar">

            <div class="logo">
                NerdPort
            </div>

            <div id="users"></div>

        </div>

        <div class="main">

            <div class="topbar">

                <h2>Live Chat</h2>

                <div class="controls">

                    <button
                    onclick="toggleMic()">
                        Mic
                    </button>

                    <button
                    onclick="toggleCamera()">
                        Camera
                    </button>

                </div>

            </div>

            <div id="videos"></div>

            <div class="chat">

                <div
                class="messages"
                id="messages"></div>

                <div class="chat-bottom">

                    <input
                    id="messageInput"
                    placeholder="Message">

                    <button
                    onclick="sendMessage()">
                        Send
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const PASSWORD = "6741";

const socket = io();

let localStream;

let username;

const peers = {};

const iceConfig = {
    iceServers:[
        {
            urls:
            "stun:stun.l.google.com:19302"
        }
    ]
};

/* JOIN */

async function join(){

    username =
        document
        .getElementById(
            "username"
        ).value.trim();

    const password =
        document
        .getElementById(
            "password"
        ).value;

    if(password !== PASSWORD){

        alert("Wrong password");

        return;

    }

    try{

        localStream =
            await navigator
            .mediaDevices
            .getUserMedia({
                video:true,
                audio:true
            });

    }catch(err){

        alert(
            "Camera/Microphone blocked"
        );

        return;

    }

    document
    .getElementById(
        "login"
    ).style.display = "none";

    document
    .getElementById(
        "app"
    ).style.display = "block";

    addVideo(
        socket.id,
        localStream,
        username + " (You)",
        true
    );

    socket.emit(
        "join",
        username
    );

}

/* VIDEO */

function addVideo(
    id,
    stream,
    name,
    muted
){

    if(
        document.getElementById(
            "video-" + id
        )
    ) return;

    const card =
        document.createElement(
            "div"
        );

    card.className =
        "video-card";

    card.id =
        "video-" + id;

    const video =
        document.createElement(
            "video"
        );

    video.srcObject =
        stream;

    video.autoplay = true;

    video.playsInline = true;

    video.muted = muted;

    video.onloadedmetadata =
        () => {

        video.play();

    };

    const label =
        document.createElement(
            "div"
        );

    label.className =
        "video-label";

    label.innerText =
        name;

    card.appendChild(video);

    card.appendChild(label);

    document
    .getElementById(
        "videos"
    )
    .appendChild(card);

}

/* USERS */

socket.on(
    "users",
    users => {

        const usersDiv =
            document
            .getElementById(
                "users"
            );

        usersDiv.innerHTML = "";

        Object.values(users)
        .forEach(name => {

            const div =
                document
                .createElement(
                    "div"
                );

            div.className =
                "user";

            div.innerText =
                name;

            usersDiv.appendChild(div);

        });

    }
);

/* EXISTING USERS */

socket.on(
    "all-users",
    users => {

        Object.entries(users)
        .forEach(([id,name]) => {

            if(id === socket.id)
                return;

            createPeer(
                id,
                true,
                name
            );

        });

    }
);

/* NEW USER */

socket.on(
    "user-connected",
    data => {

        createPeer(
            data.id,
            false,
            data.username
        );

    }
);

/* PEER */

async function createPeer(
    id,
    initiator,
    name
){

    if(peers[id]) return;

    const peer =
        new RTCPeerConnection(
            iceConfig
        );

    peers[id] = peer;

    localStream
    .getTracks()
    .forEach(track => {

        peer.addTrack(
            track,
            localStream
        );

    });

    peer.ontrack = event => {

        addVideo(
            id,
            event.streams[0],
            name,
            false
        );

    };

    peer.onicecandidate =
        event => {

        if(event.candidate){

            socket.emit(
                "signal",
                {
                    to:id,
                    signal:{
                        candidate:
                        event.candidate
                    }
                }
            );

        }

    };

    if(initiator){

        const offer =
            await peer
            .createOffer();

        await peer
        .setLocalDescription(
            offer
        );

        socket.emit(
            "signal",
            {
                to:id,
                signal:{
                    sdp:
                    peer.localDescription
                }
            }
        );

    }

}

/* SIGNAL */

socket.on(
    "signal",
    async data => {

        let peer =
            peers[data.from];

        if(!peer){

            await createPeer(
                data.from,
                false,
                data.username
            );

            peer =
                peers[data.from];

        }

        if(data.signal.sdp){

            await peer
            .setRemoteDescription(
                new RTCSessionDescription(
                    data.signal.sdp
                )
            );

            if(
                data.signal.sdp.type
                === "offer"
            ){

                const answer =
                    await peer
                    .createAnswer();

                await peer
                .setLocalDescription(
                    answer
                );

                socket.emit(
                    "signal",
                    {
                        to:data.from,
                        signal:{
                            sdp:
                            peer
                            .localDescription
                        }
                    }
                );

            }

        }

        if(data.signal.candidate){

            try{

                await peer
                .addIceCandidate(
                    new RTCIceCandidate(
                        data.signal
                        .candidate
                    )
                );

            }catch(err){

                console.log(err);

            }

        }

    }
);

/* DISCONNECT */

socket.on(
    "user-disconnected",
    id => {

        if(peers[id]){

            peers[id].close();

            delete peers[id];

        }

        const video =
            document.getElementById(
                "video-" + id
            );

        if(video){

            video.remove();

        }

    }
);

/* CHAT */

function sendMessage(){

    const input =
        document
        .getElementById(
            "messageInput"
        );

    if(input.value.trim()==="")
        return;

    socket.emit(
        "message",
        {
            user:username,
            text:input.value
        }
    );

    input.value = "";

}

socket.on(
    "message",
    data => {

        const div =
            document
            .createElement(
                "div"
            );

        div.className =
            "message";

        div.innerText =
            data.user +
            ": " +
            data.text;

        document
        .getElementById(
            "messages"
        )
        .appendChild(div);

    }
);

/* MIC */

function toggleMic(){

    const track =
        localStream
        .getAudioTracks()[0];

    track.enabled =
        !track.enabled;

}

/* CAMERA */

function toggleCamera(){

    const track =
        localStream
        .getVideoTracks()[0];

    track.enabled =
        !track.enabled;

}

</script>

</body>
</html>
